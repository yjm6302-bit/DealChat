<!DOCTYPE html>
<html>

<head>
</head>

<body>
  <script>
    try {
      var userData = JSON.parse(localStorage.getItem('dealchat_users'));
      if (userData && userData.isLoggedIn === true) {
        window.location.href = 'html/index.html';
      } else {
        window.location.href = 'html/signin.html';
      }
    } catch (e) {
      window.location.href = 'html/signin.html';
    }
  </script>
</body>

</html>
